<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Finans Akademi</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="fa-system.css">
<style>
body { background: var(--bg); }

.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.login-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.login-logo {
  width: 52px; height: 52px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff;
  margin: 0 auto 20px;
}
.login-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 15px; color: var(--text-primary);
  outline: none; margin-bottom: 12px;
  text-align: center; letter-spacing: 4px;
  transition: border-color 0.15s;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.login-btn:hover { background: var(--accent-hover); }
.login-err {
  margin-top: 10px; font-size: 13px; color: #B91C1C;
  display: none;
}

/* PANEL */
.panel { display: none; }
.panel-nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.panel-logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--text-primary); }
.panel-logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
.logout-btn { font-size: 12px; font-weight: 500; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; font-family: var(--font); }
.logout-btn:hover { color: #B91C1C; border-color: #FECACA; }

.panel-main { max-width: 900px; margin: 0 auto; padding: 40px 32px 80px; }

.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 36px; }
.stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
.stat-n { font-size: 30px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; }
.stat-l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.sec-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.refresh-btn { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-light); border: none; border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; font-family: var(--font); }

.msg-list { display: flex; flex-direction: column; gap: 10px; }
.msg { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.msg-top { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.msg-top:hover { background: var(--bg); }
.msg-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.msg-email { font-size: 12px; color: var(--text-muted); }
.msg-meta { display: flex; align-items: center; gap: 10px; }
.msg-date { font-size: 11px; color: var(--text-faint); }
.msg-konu { font-size: 11px; font-weight: 600; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 10px; }
.msg-body { display: none; padding: 14px 18px; font-size: 13.5px; color: var(--text-body); line-height: 1.65; background: var(--bg); border-top: 1px solid var(--border); }
.msg-body.open { display: block; }
.empty { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
.loading-txt { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>

<!-- GİRİŞ -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo">FA</div>
    <div class="login-title">Admin Girişi</div>
    <div class="login-sub">Finans Akademi yönetim paneli</div>
    <input class="login-input" type="password" id="pw" placeholder="••••••••">
    <button class="login-btn" id="giris-btn">Giriş Yap</button>
    <div class="login-err" id="login-err">Şifre hatalı. Tekrar deneyin.</div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <nav class="panel-nav">
    <div class="panel-logo">
      <div class="panel-logo-mark">FA</div>
      Admin Panel
    </div>
    <button class="logout-btn" id="logout-btn">Çıkış Yap</button>
  </nav>
  <div class="panel-main">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-toplam">—</div><div class="stat-l">Toplam Mesaj</div></div>
      <div class="stat"><div class="stat-n" id="s-bugun">—</div><div class="stat-l">Bugün</div></div>
      <div class="stat"><div class="stat-n" id="s-hafta">—</div><div class="stat-l">Bu Hafta</div></div>
    </div>
    <div class="sec-header">
      <div class="sec-title">Gelen Mesajlar</div>
      <button class="refresh-btn" id="refresh-btn">↻ Yenile</button>
    </div>
    <div class="msg-list" id="msg-list">
      <div class="loading-txt">Yükleniyor...</div>
    </div>
  </div>
</div>

<script>
const SIFRE = 'finans2026';
const SUPABASE_URL = 'https://kiaguwpfdzffibmltdnl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYWd1d3BmZHpmZmlibWx0ZG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTI1OTksImV4cCI6MjA5NzY2ODU5OX0.HCtFsw6yV_5QufwOg4rLR--MXis0TO2i820ENMw1VgU';

// Butonları yakala
document.getElementById('giris-btn').addEventListener('click', giris);
document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') giris(); });
document.getElementById('logout-btn').addEventListener('click', cikis);
document.getElementById('refresh-btn').addEventListener('click', yukle);

function giris() {
  var val = document.getElementById('pw').value;
  if (val === SIFRE) {
    sessionStorage.setItem('fa_ok','1');
    goster();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

function cikis() {
  sessionStorage.removeItem('fa_ok');
  location.reload();
}

function goster() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  yukle();
}

if (sessionStorage.getItem('fa_ok') === '1') goster();

async function yukle() {
  var liste = document.getElementById('msg-list');
  liste.innerHTML = '<div class="loading-txt">Yükleniyor...</div>';

  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/iletisim?select=*&order=created_at.desc', {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    var data = await res.json();

    if (!Array.isArray(data)) {
      liste.innerHTML = '<div class="empty">Veri alınamadı: ' + JSON.stringify(data) + '</div>';
      return;
    }

    var simdi = new Date();
    var bugunBas = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate());
    var haftaBas = new Date(simdi); haftaBas.setDate(simdi.getDate()-7);

    document.getElementById('s-toplam').textContent = data.length;
    document.getElementById('s-bugun').textContent = data.filter(function(m){ return new Date(m.created_at) >= bugunBas; }).length;
    document.getElementById('s-hafta').textContent = data.filter(function(m){ return new Date(m.created_at) >= haftaBas; }).length;

    if (data.length === 0) {
      liste.innerHTML = '<div class="empty">Henüz mesaj yok.</div>';
      return;
    }

    liste.innerHTML = data.map(function(m, i) {
      return '<div class="msg">' +
        '<div class="msg-top" onclick="toggle(' + i + ')">' +
          '<div><div class="msg-name">' + esc(m.ad_soyad) + '</div><div class="msg-email">' + esc(m.email) + '</div></div>' +
          '<div class="msg-meta">' +
            (m.konu ? '<span class="msg-konu">' + esc(m.konu) + '</span>' : '') +
            '<span class="msg-date">' + fmt(m.created_at) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="msg-body" id="mb-' + i + '">' + esc(m.mesaj) + '</div>' +
      '</div>';
    }).join('');

  } catch(e) {
    liste.innerHTML = '<div class="empty">Hata: ' + e.message + '</div>';
  }
}

function toggle(i) {
  var el = document.getElementById('mb-' + i);
  el.classList.toggle('open');
}

function fmt(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('tr-TR', {day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
