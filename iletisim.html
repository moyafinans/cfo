<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İletişim — Finans Akademi</title>
<meta name="description" content="Finans Akademi ile iletişime geçin.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="fa-system.css">
<style>
.fa-main { max-width: 600px; margin: 0 auto; padding: 0 32px 80px; }

.form-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  box-shadow: var(--shadow);
}
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.form-input {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 14px;
  color: var(--text-primary); background: var(--white);
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(15,76,129,0.08);
}
.form-input::placeholder { color: var(--text-faint); }
textarea.form-input { resize: vertical; min-height: 130px; line-height: 1.6; }

.form-btn {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s; margin-top: 6px;
}
.form-btn:hover { background: var(--accent-hover); }
.form-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.form-err {
  display: none;
  background: #FEF2F2; border: 1px solid #FECACA;
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-size: 13px; color: #B91C1C; margin-top: 12px;
}

.form-success {
  display: none; text-align: center; padding: 40px 20px;
}
.success-icon {
  width: 56px; height: 56px;
  background: #ECFDF5; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 16px;
}
.form-success h3 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.form-success p { font-size: 14px; color: var(--text-muted); }

@media (max-width: 640px) {
  .fa-main { padding: 0 16px 60px; }
  .form-card { padding: 24px; }
}
</style>
</head>
<body>

<nav class="fa-nav">
  <a href="index.html" class="fa-nav-logo">
    <div class="fa-nav-logo-mark">FA</div>
    Finans Akademi
  </a>
  <a href="index.html" class="fa-nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M10 12L6 8l4-4"/>
    </svg>
    Ana Sayfa
  </a>
</nav>

<div class="fa-main">
  <div class="fa-page-header">
    <div class="fa-page-eyebrow">İletişim</div>
    <h1 class="fa-page-title">Bize Ulaşın</h1>
    <p class="fa-page-desc">Sorularınız, önerileriniz veya katkılarınız için formu doldurun.</p>
  </div>

  <div class="form-card">
    <div id="form-area">
      <div class="form-group">
        <label class="form-label" for="ad_soyad">Ad Soyad *</label>
        <input class="form-input" type="text" id="ad_soyad" placeholder="Adınız ve soyadınız">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">E-posta *</label>
        <input class="form-input" type="email" id="email" placeholder="ornek@email.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="konu">Konu</label>
        <input class="form-input" type="text" id="konu" placeholder="Mesajınızın konusu">
      </div>
      <div class="form-group">
        <label class="form-label" for="mesaj">Mesaj *</label>
        <textarea class="form-input" id="mesaj" placeholder="Mesajınızı buraya yazın..."></textarea>
      </div>
      <button class="form-btn" id="gonder-btn">Gönder</button>
      <div class="form-err" id="form-err"></div>
    </div>

    <div class="form-success" id="form-success">
      <div class="success-icon">✓</div>
      <h3>Mesajınız İletildi</h3>
      <p>En kısa sürede size dönüş yapacağız.</p>
    </div>
  </div>
</div>

<footer class="fa-footer">
  <div class="fa-footer-logo">Finans <span>Akademi</span></div>
  <div class="fa-footer-copy">© 2026 · moyafinans.github.io/cfo</div>
</footer>

<script>
var SUPABASE_URL = 'https://kiaguwpfdzffibmltdnl.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpYWd1d3BmZHpmZmlibWx0ZG5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTI1OTksImV4cCI6MjA5NzY2ODU5OX0.HCtFsw6yV_5QufwOg4rLR--MXis0TO2i820ENMw1VgU';

document.getElementById('gonder-btn').addEventListener('click', function() {
  gonder();
});

async function gonder() {
  var btn = document.getElementById('gonder-btn');
  var errDiv = document.getElementById('form-err');
  errDiv.style.display = 'none';

  var ad_soyad = document.getElementById('ad_soyad').value.trim();
  var email = document.getElementById('email').value.trim();
  var konu = document.getElementById('konu').value.trim();
  var mesaj = document.getElementById('mesaj').value.trim();

  if (!ad_soyad) { hata('Ad Soyad zorunludur.'); return; }
  if (!email) { hata('E-posta zorunludur.'); return; }
  if (!mesaj) { hata('Mesaj zorunludur.'); return; }

  btn.disabled = true;
  btn.textContent = 'Gönderiliyor...';

  try {
    var res = await fetch(SUPABASE_URL + '/rest/v1/iletisim', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ ad_soyad: ad_soyad, email: email, konu: konu, mesaj: mesaj })
    });

    if (res.ok) {
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
    } else {
      var err = await res.json();
      hata('Hata: ' + (err.message || res.status));
      btn.disabled = false;
      btn.textContent = 'Gönder';
    }
  } catch(e) {
    hata('Bağlantı hatası: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Gönder';
  }
}

function hata(msg) {
  var el = document.getElementById('form-err');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
